name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (toolchain + Mathlib cache + lake build)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true

      - name: Sorry-free axiom gate
        run: |
          set -euo pipefail
          # Re-run #print axioms on the headline theorems and fail if any depends on `sorryAx`.
          out=$(lake env lean scripts/check_sorry_free.lean)
          echo "$out"
          if echo "$out" | grep -q 'sorryAx'; then
            echo "::error::A headline theorem depends on sorryAx (admitted proof reintroduced)."
            exit 1
          fi
          echo "All headline theorems are sorry-free."

      - name: ForMathlib minimal-imports gate
        run: |
          set -euo pipefail
          # ForMathlib files are upstream-facing: they must use minimal specific Mathlib imports,
          # never the whole-library `import Mathlib`. (The build already ensures imports suffice;
          # this guards that they stay minimal.)
          if grep -rn '^import Mathlib$' NeuralNetworkProofs/ForMathlib/; then
            echo "::error::A ForMathlib file uses 'import Mathlib'; replace with minimal imports."
            exit 1
          fi
          echo "ForMathlib files use minimal imports (no whole-library 'import Mathlib')."
