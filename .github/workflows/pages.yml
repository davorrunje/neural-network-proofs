name: Deploy website

on:
  push:
    branches: [main]
    # Only rebuild/deploy when something the site depends on changes; skip pushes
    # that touch only unrelated docs/infra. workflow_dispatch stays for manual runs.
    paths:
      - 'NeuralNetworkProofs/**'
      - 'blueprint/**'
      - 'site/**'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'scripts/setup-dev.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean project (toolchain + Mathlib cache)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true

      - name: Install blueprint toolchain (pinned recipe)
        run: |
          bash scripts/setup-dev.sh --no-build --no-cache
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build blueprint (web + dependency graph)
        run: leanblueprint web

      - name: Faithfulness gate (lake exe checkdecls)
        run: lake exe checkdecls blueprint/lean_decls

      - name: Cache doc-gen4 output
        uses: actions/cache@v4
        with:
          path: .lake/build/doc
          key: docs-${{ hashFiles('lake-manifest.json') }}

      - name: Build API docs (doc-gen4)
        run: lake build NeuralNetworkProofs:docs

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/blueprint
          cp -r blueprint/web/. _site/blueprint/
          # Expose the dependency graph at the URL the landing page links to.
          if [ -f _site/blueprint/dep_graph_document.html ]; then
            cp _site/blueprint/dep_graph_document.html _site/blueprint/dep_graph.html
          fi
          mkdir -p _site/docs
          cp -r .lake/build/doc/. _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
