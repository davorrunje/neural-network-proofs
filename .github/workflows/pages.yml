name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean project (toolchain + Mathlib cache)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true

      - name: Install blueprint toolchain (pinned recipe)
        run: |
          bash scripts/setup-dev.sh --no-build --no-cache
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build blueprint (web + dependency graph)
        run: leanblueprint web

      - name: Faithfulness gate (lake exe checkdecls)
        run: lake exe checkdecls blueprint/lean_decls

      # doc-gen4 API docs are deferred: building the full Mathlib closure is too
      # heavy for a free runner and the output exceeds the GitHub Pages size
      # limit. Track scoped (our-modules-only) API docs as a follow-up.
      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/blueprint
          cp -r blueprint/web/. _site/blueprint/
          # Expose the dependency graph at the URL the landing page links to.
          if [ -f _site/blueprint/dep_graph_document.html ]; then
            cp _site/blueprint/dep_graph_document.html _site/blueprint/dep_graph.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
